_metadata:
  major_version: 1
display_information:
  name: Repo Maintainer Agent
  description: Conversational GitHub issue remediation teammate
  background_color: "#15233D"
features:
  bot_user:
    display_name: repo-maintainer
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - app_mentions:read
      - im:history
      - im:read
      - im:write
      - channels:history
      - channels:read
settings:
  socket_mode_enabled: true
  token_rotation_enabled: false
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
